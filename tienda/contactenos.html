</head>

<body>

    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            
            <a href="/parchemos_pag/tienda/index.html" class="navbar-brand">Parchemos Travel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a href="/parchemos_pag/tienda/index.html" class="nav-link active">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a href="/parchemos_pag/tienda/" class="nav-link">Destinos</a>
                    </li>
                    <li class="nav-item">
                        <a href="/parchemos_pag/tienda/pag.html" class="nav-link">Experiencias</a>

    <!--Div-->
    <div class="card mx-auto shadow" style="max-width: 500px;">
        <h2>Te queremos escuchar</h2>
       <form action="https://formspree.io/f/xvznjvze" class="fs-form" target="_top" method="POST">
            <div class="fs-field">
                <label class="fs-label" for="name">Parcera/o</label>
                <input class="fs-input" id="name" name="name" type="text" placeholder="Nombre completo" required>
            </div>
            <div class="fs-field">
                <label class="fs-label" for="email">Correo electrónico</label>
                <input class="fs-input" id="email" name="email" type="email" placeholder="nombre@ejemplo.com" required>
            </div>
            <div class="fs-field">
                <label class="fs-label" for="number">Teléfono</label>
                <input class="fs-input" id="number" name="number" type="tel" placeholder="+57 300 123 4567">
            </div>
            <div class="fs-field">
                <label class="fs-label" for="message">Mensaje</label>
                <textarea class="fs-textarea" id="message" name="message"
                    placeholder="Cuéntanos cómo podemos ayudarte..." required></textarea>
            </div>
            <div class="fs-button-group">
                <button class="fs-button" type="submit">Enviar</button>
            </div>
        </form>
    </div>
    
    
    
    
    
    
    
    
    <script src="/parchemos_pag/js/contactenos.js"></script>
